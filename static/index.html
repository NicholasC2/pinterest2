<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>pinterest2</title>
        <link rel="stylesheet" href="assets/css/colors.css">
        <link rel="stylesheet" href="assets/css/global.css">

        <link rel="stylesheet" href="assets/css/navbar.css">

        <link rel="stylesheet" href="assets/css/gallery.css">
    </head>
    <body>
        <nav class="navbar">
            <div class="nav-links">
                <a href="/" class="button">Home</a>
            </div>
            <div class="navbar-spacer flex"></div>
            <div class="search">
                <input type="text" placeholder="Search">
                <button>
                    <img src="assets/images/search-light.svg">
                </button>
            </div>
            <div class="account" onclick="this.classList.contains('open') ? this.classList.remove('open') : this.classList.add('open')">
                <img src="assets/images/placeholder.png" class="avatar">
                <img src="assets/images/arrow-down-light.svg" class="arrow">
            </div>
        </nav>

        <div class="gallery">
            <div class="grid-sizer"></div>
        </div>

        <div id="load-more-trigger"></div>

        <script src="assets/js/masonry.pkgd.min.js"></script>

        <script>
            const msnry = new Masonry(document.querySelector('.gallery'), {
                itemSelector: '.gallery-item',
                columnWidth: '.grid-sizer',
                percentPosition: true,
            });
        </script>

        <input type="file" class="fileInput">

        <script src="assets/js/client.js"></script>
    </body>
</html>
